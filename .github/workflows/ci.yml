name: CI
on:
  push:
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Integration test
        if: env.COPILOT_GITHUB_TOKEN
        run: npm run test:integration

      - name: Integration test skipped (no token)
        if: ${{ !env.COPILOT_GITHUB_TOKEN }}
        run: echo "Skipping integration tests: COPILOT_GITHUB_TOKEN is not available."
